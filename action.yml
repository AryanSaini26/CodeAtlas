name: "CodeAtlas PR Intelligence"
description: "Graph-based blast-radius, suggested tests, risk score, and SARIF for a pull request"
branding:
  icon: "git-pull-request"
  color: "blue"
inputs:
  base:
    description: "Base ref to diff against"
    required: false
    default: "origin/main"
  python-version:
    description: "Python version"
    required: false
    default: "3.12"
runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    - shell: bash
      run: pip install "codeatlas[mcp,api,webhook,hosted]"
    - shell: bash
      run: |
        codeatlas index . --db .codeatlas/graph.db
        codeatlas pr-analyze --base "${{ inputs.base }}" --head HEAD \
          --db .codeatlas/graph.db \
          --markdown codeatlas-pr-report.md \
          --sarif codeatlas-pr.sarif
    - uses: github/codeql-action/upload-sarif@v3
      continue-on-error: true
      with:
        sarif_file: codeatlas-pr.sarif
        category: codeatlas-pr
