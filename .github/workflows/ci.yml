name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node
        if: matrix.python-version == '3.13'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            vscode-extension/package-lock.json

      - name: Install dependencies
        run: pip install -e ".[mcp,api,webhook,hosted,dev]" faiss-cpu

      - name: Lint
        run: ruff check src tests

      - name: Format check
        run: ruff format --check src tests

      - name: Type check
        run: mypy src/codeatlas

      - name: Test with coverage
        run: pytest -v --cov=codeatlas --cov-report=xml --cov-report=term-missing

      - name: Benchmark smoke
        if: matrix.python-version == '3.13'
        run: |
          codeatlas bench . --profile --eval-suite benchmarks/eval-suite.json --json --output /tmp/codeatlas-bench-results.json
          test -s /tmp/codeatlas-bench-results.json

      - name: Agent eval smoke
        if: matrix.python-version == '3.13'
        run: |
          codeatlas agent-eval --suite benchmarks/agent-suite.json --repos benchmarks/repos.lock.yml --out /tmp/codeatlas-agent-eval --dry-run
          test -s /tmp/codeatlas-agent-eval/results.json
          test -s /tmp/codeatlas-agent-eval/report.md

      - name: Build Python package
        if: matrix.python-version == '3.13'
        run: python -m build

      - name: Build frontend
        if: matrix.python-version == '3.13'
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Compile VS Code extension
        if: matrix.python-version == '3.13'
        working-directory: vscode-extension
        run: |
          npm ci
          npm run compile

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
