name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write  # for gh release create
  id-token: write  # for PyPI trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build hatchling

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify pyproject.toml version matches tag
        run: |
          TOML_VERSION=$(python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$TOML_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: pyproject.toml=$TOML_VERSION tag=$TAG_VERSION"
            exit 1
          fi
          echo "Version $TOML_VERSION matches tag"

      - name: Run tests
        run: |
          pip install -e ".[all,dev]"
          pytest -q

      - name: Build distributions
        run: python -m build

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/* \
            --title "CodeAtlas ${{ github.ref_name }}" \
            --generate-notes

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
